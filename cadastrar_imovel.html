<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Anúncio - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4 border-0">
                <h2 class="text-center mb-4 text-danger fw-bold">Novo Anúncio</h2>
                
                <div id="msg-status"></div>

                <form id="form-imovel">
                    <div class="mb-3">
                        <label class="form-label">Título do Anúncio</label>
                        <input type="text" id="titulo" class="form-control" placeholder="Ex: Casa na praia com piscina" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Cidade</label>
                        <input type="text" id="cidade" class="form-control" placeholder="Ex: Florianópolis - SC" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descrição completa</label>
                        <textarea id="descricao" class="form-control" rows="4" placeholder="Fale sobre o espaço, comodidades..." required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Preço da Diária (R$)</label>
                        <input type="number" id="preco" class="form-control" placeholder="Ex: 250" step="0.01" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Foto do Imóvel</label>
                        <input type="file" id="imagem" class="form-control" accept="image/png, image/jpeg, image/jpg" required>
                    </div>
                    
                    <button type="submit" id="btn-submit" class="btn btn-success w-100 py-2 fs-5">Cadastrar Imóvel</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Variável para guardar quem é o usuário logado
    let usuarioLogadoId = null;

// 1. Verifica se a pessoa está logada antes de deixar ela cadastrar
async function verificarAutenticacao() {
    const { data: { user } } = await supabase.auth.getUser();
    
    if (!user) {
        alert("Você precisa estar logado para anunciar um imóvel.");
        window.location.href = 'login.html';
    } else {
        // Usa o UUID padrão do Supabase Auth diretamente!
        usuarioLogadoId = user.id; 
    }
}

    // 2. Ação de envio do formulário
    document.getElementById('form-imovel').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btn-submit');
        const msgDiv = document.getElementById('msg-status');
        
        btn.disabled = true;
        btn.innerText = "Fazendo upload da imagem...";
        msgDiv.innerHTML = "";

        const titulo = document.getElementById('titulo').value;
        const cidade = document.getElementById('cidade').value;
        const descricao = document.getElementById('descricao').value;
        const preco = document.getElementById('preco').value;
        const arquivoInput = document.getElementById('imagem');
        const arquivo = arquivoInput.files[0];

        try {
            // Passo 3: Criar um nome único para a imagem (igual você fazia com o time() no PHP)
            const extensao = arquivo.name.split('.').pop();
            const nomeImagem = `${Date.now()}_${Math.random().toString(36).substring(7)}.${extensao}`;

            // Passo 4: Fazer o upload para o Supabase Storage
            const { error: uploadError } = await supabase.storage
                .from('imoveis-imagens')
                .upload(nomeImagem, arquivo);

            if (uploadError) throw uploadError;

            btn.innerText = "Salvando no banco de dados...";

            // Passo 5: Salvar os dados na tabela 'imoveis'
            const { error: dbError } = await supabase
                .from('imoveis')
                .insert([
                    {
                        dono_id: usuarioLogadoId,
                        titulo: titulo,
                        cidade: cidade,
                        descricao: descricao,
                        preco_diaria: preco,
                        imagem: nomeImagem // Salvamos apenas o nome do arquivo, como no seu PHP
                    }
                ]);

            if (dbError) throw dbError;

            // Sucesso!
            msgDiv.innerHTML = `<div class='alert alert-success'>Imóvel cadastrado com sucesso! Redirecionando...</div>`;
            setTimeout(() => {
                window.location.href = 'index.html'; // Manda pro início para ver o anúncio
            }, 2000);

        } catch (erro) {
            console.error(erro);
            msgDiv.innerHTML = `<div class='alert alert-danger'>Erro: ${erro.message}</div>`;
            btn.disabled = false;
            btn.innerText = "Cadastrar Imóvel";
        }
    });
</script>
</body>
</html>
