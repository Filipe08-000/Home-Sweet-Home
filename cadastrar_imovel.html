<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Anúncio - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4 border-0">
                <h2 class="text-center mb-4 text-danger fw-bold">Novo Anúncio</h2>
                
                <div id="msg-status"></div>

                <form id="form-imovel">
                    <div class="mb-3">
                        <label class="form-label">Título do Anúncio</label>
                        <input type="text" id="titulo" class="form-control" placeholder="Ex: Casa na praia com piscina" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Cidade</label>
                        <input type="text" id="cidade" class="form-control" placeholder="Ex: Florianópolis - SC" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Descrição completa</label>
                        <textarea id="descricao" class="form-control" rows="4" placeholder="Fale sobre o espaço, comodidades..." required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Preço da Diária (R$)</label>
                        <input type="number" id="preco" class="form-control" placeholder="Ex: 250" step="0.01" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Foto do Imóvel</label>
                        <input type="file" id="imagem" class="form-control" accept="image/png, image/jpeg, image/jpg" required>
                    </div>
                    
                    <button type="submit" id="btn-submit" class="btn btn-success w-100 py-2 fs-5">Cadastrar Imóvel</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // ... (suas importações e config do supabase)

    let usuarioLogadoId = null;

    async function verificarAutenticacao() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
            alert("Você precisa estar logado para anunciar um imóvel.");
            window.location.href = 'login.html';
        } else {
            // USANDO O UUID DIRETO DO AUTH
            usuarioLogadoId = user.id; 
        }
    }

    verificarAutenticacao();

    document.getElementById('form-imovel').addEventListener('submit', async (e) => {
        e.preventDefault();
        // ... (pegar valores do formulário)

        try {
            // ... (lógica de upload da imagem)

            // SALVANDO NO BANCO
            const { error: dbError } = await supabase
                .from('imoveis')
                .insert([
                    {
                        dono_id: usuarioLogadoId, // Agora enviando o UUID correto
                        titulo: titulo,
                        cidade: cidade,
                        descricao: descricao,
                        preco_diaria: preco,
                        imagem: nomeImagem
                    }
                ]);

            if (dbError) throw dbError;
            // ... (sucesso)
        } catch (erro) {
            // ... (tratar erro)
        }
    });
</script>
</body>
</html>
