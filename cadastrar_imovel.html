<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar Imóvel - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 p-4">
                <h2 class="text-center text-danger fw-bold mb-4">Novo Anúncio</h2>
                
                <div id="msg-status"></div>

                <form id="form-anuncio">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Título do Anúncio</label>
                        <input type="text" id="titulo" class="form-control" placeholder="Ex: Casa aconchegante na praia" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Cidade</label>
                        <input type="text" id="cidade" class="form-control" placeholder="Ex: Rio de Janeiro" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição completa</label>
                        <textarea id="descricao" class="form-control" rows="4" placeholder="Conte mais sobre o espaço..." required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Preço da Diária (R$)</label>
                        <input type="number" id="preco" class="form-control" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Foto do Imóvel</label>
                        <input type="file" id="foto" class="form-control" accept="image/*" required>
                    </div>

                    <button type="submit" id="btn-cadastrar" class="btn btn-success w-100 py-2 fs-5 fw-bold">Cadastrar Imóvel</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    document.getElementById('form-anuncio').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btn-cadastrar');
        const msgDiv = document.getElementById('msg-status');
        
        // 1. Pegar o usuário logado no momento (Isso retorna o UUID correto)
        const { data: { user }, error: authError } = await supabase.auth.getUser();

        if (authError || !user) {
            msgDiv.innerHTML = `<div class="alert alert-danger">Você precisa estar logado para anunciar.</div>`;
            window.location.href = 'login.html';
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            const fotoFile = document.getElementById('foto').files[0];
            const nomeArquivo = `${Date.now()}_${fotoFile.name}`;

            // 2. Upload da Imagem
            const { data: imgData, error: imgError } = await supabase.storage
                .from('imoveis-imagens')
                .upload(nomeArquivo, fotoFile);

            if (imgError) throw imgError;

            // 3. Cadastro no Banco (Enviando o user.id que é UUID)
            const { error: dbError } = await supabase
                .from('imoveis')
                .insert([{
                    titulo: document.getElementById('titulo').value,
                    cidade: document.getElementById('cidade').value,
                    descricao: document.getElementById('descricao').value,
                    preco_diaria: parseFloat(document.getElementById('preco').value),
                    imagem: nomeArquivo,
                    dono_id: user.id // Aqui está a correção: enviando o UUID real
                }]);

            if (dbError) throw dbError;

            msgDiv.innerHTML = `<div class="alert alert-success">Imóvel cadastrado com sucesso!</div>`;
            setTimeout(() => window.location.href = 'index.html', 2000);

        } catch (erro) {
            console.error(erro);
            msgDiv.innerHTML = `<div class="alert alert-danger">Erro: ${erro.message}</div>`;
            btn.disabled = false;
            btn.innerText = "Cadastrar Imóvel";
        }
    });
</script>
</body>
</html>
