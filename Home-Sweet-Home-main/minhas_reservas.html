<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas Recebidas - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <a href="painel.html" class="btn btn-outline-dark btn-sm">Voltar ao Painel</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4">Hóspedes Confirmados</h2>
    <div class="card shadow border-0">
        <div class="card-body">
            <table class="table align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Imóvel</th>
                        <th>Hóspede</th>
                        <th>Datas</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-reservas">
                    <tr><td colspan="5" class="text-center">Buscando reservas...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function carregarReservas() {
        const { data: { user } } = await supabase.auth.getUser();
        const { data: usuarioDb } = await supabase.from('usuarios').select('id').eq('email', user.email).single();

        const { data: reservas, error } = await supabase
            .from('reservas')
            .select('*, imoveis!inner(titulo, dono_id), usuarios(nome)')
            .eq('imoveis.dono_id', usuarioDb.id)
            .order('data_inicio', { ascending: false });

        const tbody = document.getElementById('lista-reservas');
        tbody.innerHTML = '';

        if (!reservas || reservas.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">Nenhuma reserva recebida.</td></tr>';
            return;
        }

        reservas.forEach(res => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${res.imoveis.titulo}</td>
                <td><strong>${res.usuarios.nome}</strong></td>
                <td>${new Date(res.data_inicio).toLocaleDateString('pt-BR')} - ${new Date(res.data_fim).toLocaleDateString('pt-BR')}</td>
                <td><span class="badge ${res.status === 'Cancelada' ? 'bg-danger' : 'bg-success'}">${res.status}</span></td>
                <td>
                    <a href="chat.html?imovel_id=${res.imovel_id}&destinatario_id=${res.usuario_id}" class="btn btn-sm btn-primary">Chat</a>
                    ${res.status !== 'Cancelada' ? `<button class="btn btn-danger btn-sm btn-cancelar-hospede" data-id="${res.id}">Cancelar</button>` : ''}
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.querySelectorAll('.btn-cancelar-hospede').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                if(confirm('Cancelar a reserva deste hóspede?')) {
                    await supabase.from('reservas').update({ status: 'Cancelada' }).eq('id', e.target.dataset.id);
                    location.reload();
                }
            });
        });
    }
    carregarReservas();
</script>
</body>
</html>
