<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Sweet Home - Encontre seu lar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        
        <div class="d-flex align-items-center">
            <div id="guest-menu">
                <a href="cadastrar_imovel.html" class="btn btn-outline-dark me-3 d-none d-md-inline-block">Anuncie seu espaço</a>
                <a href="login.html" class="btn btn-dark">Entrar</a>
            </div>

            <div id="user-menu" class="d-none">
                <a href="minhas_reservas.html" class="btn btn-outline-dark me-2 d-none d-md-inline-block">Minhas Reservas</a>
                <a href="minhas_viagens.html" class="btn btn-outline-dark me-2 d-none d-md-inline-block">Minhas Viagens</a>
                <a href="painel.html" class="btn btn-outline-dark me-3 d-none d-md-inline-block">Meu Painel</a>
                <a href="cadastrar_imovel.html" class="btn btn-success me-3">Anuncie seu espaço</a>
                <span class="me-3">Olá, <strong id="user-name-display">Usuário</strong></span>
                <button id="btn-logout" class="btn btn-sm btn-danger">Sair</button>
            </div>
        </div>
    </div>
</nav>

<div class="hero text-center bg-danger text-white py-5 mb-4">
    <div class="container">
        <h1 class="display-4 fw-bold">Home Sweet Home</h1>
        <p class="lead">Encontre o lugar perfeito para sua próxima estadia.</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row" id="imoveis-container">
        <div class="col-12 text-center mt-5" id="loading-message">
            <div class="spinner-border text-danger" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p class="text-muted mt-2">Buscando imóveis incríveis...</p>
        </div>
    </div>
</div>

<footer class="bg-white border-top text-center text-lg-start mt-5">
    <div class="text-center p-3 text-muted">
        © <span id="ano-atual"></span> Home Sweet Home
    </div>
</footer>

<script type="module">
    // 1. Importa a biblioteca do Supabase direto no navegador
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // 2. Configura a conexão (COLOQUE SUAS CHAVES AQUI)
    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Coloca o ano atual no rodapé (substituindo o date("Y") do PHP)
    document.getElementById('ano-atual').innerText = new Date().getFullYear();

    // 3. Função para verificar se o usuário está logado e mudar o Cabeçalho
    async function checkAuth() {
        const { data: { user } } = await supabase.auth.getUser()
        
        if (user) {
            // Esconde menu de visitante, mostra menu logado
            document.getElementById('guest-menu').classList.add('d-none');
            document.getElementById('user-menu').classList.remove('d-none');
            // Tenta pegar o nome do usuário (vamos configurar isso no cadastro)
            document.getElementById('user-name-display').innerText = user.user_metadata?.nome || 'Anfitrião';
        }

        // Configura o botão de logout
        document.getElementById('btn-logout')?.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.reload(); // Recarrega a página após sair
        });
    }

    // 4. Função para buscar os imóveis no banco
    async function loadImoveis() {
        const container = document.getElementById('imoveis-container');
        
        // Faz o "SELECT * FROM imoveis ORDER BY id DESC"
        const { data: imoveis, error } = await supabase
            .from('imoveis')
            .select('*')
            .order('id', { ascending: false });

        // Remove o "Carregando..."
        document.getElementById('loading-message').remove();

        if (error) {
            container.innerHTML = `<div class="col-12 text-center text-danger"><p>Erro ao carregar: ${error.message}</p></div>`;
            return;
        }

        if (imoveis.length === 0) {
            container.innerHTML = `<div class="col-12 text-center"><p class="text-muted">Nenhum imóvel cadastrado ainda.</p></div>`;
            return;
        }

        // Loop para criar os cards (o antigo while($row = $result->fetch_assoc()))
        imoveis.forEach(imovel => {
            // Nota sobre a Imagem: Como você usava uma pasta local "uploads/", 
            // no futuro vamos apontar isso para o Supabase Storage. 
            // Por enquanto, vou montar uma URL que aponta para um bucket chamado 'imoveis-imagens'.
            const imageUrl = imovel.imagem 
                ? `${supabaseUrl}/storage/v1/object/public/imoveis-imagens/${imovel.imagem}` 
                : 'https://via.placeholder.com/400x220?text=Sem+Imagem';

            const precoFormatado = parseFloat(imovel.preco_diaria).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            const cardHtml = `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm border-0">
                        <img src="${imageUrl}" class="card-img-top" alt="${imovel.titulo}" style="height: 220px; object-fit: cover;" onerror="this.src='https://via.placeholder.com/400x220?text=Imagem+nao+encontrada'">
                        <div class="card-body">
                            <h5 class="card-title fw-bold">${imovel.titulo}</h5>
                            <p class="card-text text-muted small">
                                <i class="bi bi-geo-alt-fill"></i> ${imovel.cidade}
                            </p>
                            <p class="card-text fw-bold text-danger fs-5">
                                R$ ${precoFormatado} <span class="text-muted fs-6 fw-normal">/ noite</span>
                            </p>
                            <a href="detalhes.html?id=${imovel.id}" class="btn btn-danger w-100">Ver Detalhes</a>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHtml;
        });
    }

    // Inicia tudo quando a página carregar
    checkAuth();
    loadImoveis();
</script>

</body>
</html>
