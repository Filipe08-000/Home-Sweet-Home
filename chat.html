<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #chat-window { height: 450px; overflow-y: auto; background: #fdfdfd; display: flex; flex-direction: column; }
        .msg { max-width: 75%; padding: 10px; border-radius: 15px; margin-bottom: 10px; position: relative; }
        .msg-me { align-self: flex-end; background-color: #ff385c; color: white; border-bottom-right-radius: 2px; }
        .msg-them { align-self: flex-start; background-color: #e9ecef; color: #333; border-bottom-left-radius: 2px; }
        .time { font-size: 0.7rem; opacity: 0.8; display: block; margin-top: 5px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-white bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <button onclick="history.back()" class="btn btn-outline-dark btn-sm">Voltar</button>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0" id="chat-with">Conversa</h5>
                    <small class="text-muted" id="imovel-name">Carregando...</small>
                </div>
                <div class="card-body p-3" id="chat-window">
                    </div>
                <div class="card-footer bg-white border-top-0">
                    <form id="form-msg" class="d-flex">
                        <input type="text" id="input-msg" class="form-control me-2" placeholder="Digite sua mensagem..." autocomplete="off" required>
                        <button class="btn btn-danger px-4">Enviar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    const urlParams = new URLSearchParams(window.location.search);
    const imovelId = urlParams.get('imovel_id');
    const destinatarioId = urlParams.get('destinatario_id');

    let meuIdInterno = null;

    async function iniciarChat() {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) { window.location.href = 'login.html'; return; }

        // 1. Pega meu ID na tabela pública 'usuarios'
        const { data: euDb } = await supabase.from('usuarios').select('id').eq('email', user.email).single();
        meuIdInterno = euDb.id;

        // 2. Busca info do outro usuário e do imóvel
        const { data: outro } = await supabase.from('usuarios').select('nome').eq('id', destinatarioId).single();
        const { data: imovel } = await supabase.from('imoveis').select('titulo').eq('id', imovelId).single();
        
        document.getElementById('chat-with').innerText = `Conversa com ${outro.nome}`;
        document.getElementById('imovel-name').innerText = imovel.titulo;

        // 3. Carrega histórico de mensagens (o antigo SELECT do chat.php)
        const { data: historico } = await supabase
            .from('mensagens')
            .select('*')
            .eq('imovel_id', imovelId)
            .or(`and(remetente_id.eq.${meuIdInterno},destinatario_id.eq.${destinatarioId}),and(remetente_id.eq.${destinatarioId},destinatario_id.eq.${meuIdInterno})`)
            .order('data_envio', { ascending: true });

        historico?.forEach(msg => renderMsg(msg));
        scrollChat();

        // 4. 🔥 A MÁGICA: ESCUTAR MENSAGENS NOVAS EM TEMPO REAL
        supabase
            .channel('chat_realtime')
            .on('postgres_changes', { 
                event: 'INSERT', 
                schema: 'public', 
                table: 'mensagens',
                filter: `imovel_id=eq.${imovelId}` 
            }, payload => {
                const novaMsg = payload.new;
                // Só renderiza se for parte DESTA conversa específica
                if ((novaMsg.remetente_id == destinatarioId && novaMsg.destinatario_id == meuIdInterno) ||
                    (novaMsg.remetente_id == meuIdInterno && novaMsg.destinatario_id == destinatarioId)) {
                    renderMsg(novaMsg);
                    scrollChat();
                }
            })
            .subscribe();
    }

    function renderMsg(msg) {
        const container = document.getElementById('chat-window');
        const souEu = msg.remetente_id == meuIdInterno;
        const div = document.createElement('div');
        div.className = `msg ${souEu ? 'msg-me' : 'msg-them'}`;
        
        const hora = new Date(msg.data_envio).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        
        div.innerHTML = `
            ${msg.texto}
            <span class="time">${hora}</span>
        `;
        container.appendChild(div);
    }

    function scrollChat() {
        const win = document.getElementById('chat-window');
        win.scrollTop = win.scrollHeight;
    }

    // Enviar mensagem
    document.getElementById('form-msg').addEventListener('submit', async (e) => {
        e.preventDefault();
        const input = document.getElementById('input-msg');
        const texto = input.value;
        input.value = '';

        const { error } = await supabase.from('mensagens').insert([{
            imovel_id: imovelId,
            remetente_id: meuIdInterno,
            destinatario_id: destinatarioId,
            texto: texto
        }]);

        if (error) alert("Erro ao enviar: " + error.message);
    });

    iniciarChat();
</script>
</body>
</html>
