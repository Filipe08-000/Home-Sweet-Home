<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservar Imóvel - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Voltar</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow p-4 border-0">
                <h2 class="text-center mb-4 text-danger fw-bold">Confirmar Reserva</h2>
                <div id="msg-status"></div>

                <form id="form-reserva">
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Data de Início</label>
                            <input type="date" id="data_inicio" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Data de Fim</label>
                            <input type="date" id="data_fim" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Método de Pagamento</label>
                        <select id="metodo_pagamento" class="form-select">
                            <option value="pix">Pix</option>
                            <option value="cartao">Cartão de Crédito</option>
                        </select>
                    </div>

                    <button type="submit" id="btn-reservar" class="btn btn-danger w-100 py-2 fs-5">Confirmar e Pagar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Pegar o ID do imóvel da URL (ex: reserva.html?id=123)
    const urlParams = new URLSearchParams(window.location.search);
    const imovelId = urlParams.get('id');

    // 1. Função Robusta de Proteção de Página
    async function verificarAcesso() {
        const { data: { user }, error } = await supabase.auth.getUser();

        if (error || !user) {
            console.log("Usuário não autenticado.");
            window.location.href = 'login.html';
            return null;
        }

        console.log("Usuário logado:", user.id);
        return user.id;
    }

    // Executa ao carregar a página
    verificarAcesso();

    // 2. Ação de Reservar
    document.getElementById('form-reserva').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('btn-reservar');
        const msgDiv = document.getElementById('msg-status');

        btn.disabled = true;
        btn.innerText = "Processando...";

        try {
            // Pegamos o ID do usuário de novo no momento do clique para segurança
            const usuarioId = await verificarAcesso();
            if (!usuarioId) return;

            if (!imovelId) {
                throw new Error("ID do imóvel não encontrado na URL.");
            }

            const dataInicio = document.getElementById('data_inicio').value;
            const dataFim = document.getElementById('data_fim').value;
            const metodo = document.getElementById('metodo_pagamento').value;

            // 3. Salvar na tabela 'reservas'
            // IMPORTANTE: usuario_id deve ser UUID no banco
            const { error: resError } = await supabase
                .from('reservas')
                .insert([
                    {
                        imovel_id: imovelId, // int8
                        usuario_id: usuarioId, // uuid
                        data_inicio: dataInicio,
                        data_fim: dataFim,
                        metodo_pagamento: metodo,
                        status: 'pendente'
                    }
                ]);

            if (resError) throw resError;

            msgDiv.innerHTML = `<div class='alert alert-success'>Reserva realizada com sucesso!</div>`;
            setTimeout(() => window.location.href = 'minhas-reservas.html', 2000);

        } catch (erro) {
            console.error(erro);
            msgDiv.innerHTML = `<div class='alert alert-danger'>Erro: ${erro.message}</div>`;
            btn.disabled = false;
            btn.innerText = "Confirmar e Pagar";
        }
    });
</script>
</body>
</html>
