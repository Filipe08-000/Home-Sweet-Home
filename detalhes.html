<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Imóvel - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    
    <style>
        /* CORREÇÃO DO CALENDÁRIO (DATEPICKER) PARA FICAR NA FRENTE */
        #ui-datepicker-div {
            z-index: 9999 !important; 
        }
        .ui-datepicker {
            background-color: #ffffff; 
            border: 1px solid #ddd;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
            padding: 5px;
            border-radius: 5px;
        }
        .ui-datepicker-header {
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Voltar ao Início</a>
    </div>
</nav>

<div class="container mt-5 mb-5">
    <div class="row" id="loading-area">
        <div class="col-12 text-center"><p>Carregando imóvel...</p></div>
    </div>

    <div class="row d-none" id="content-area">
        <div class="col-md-8">
            <img id="imovel-img" src="" class="img-fluid rounded mb-3 w-100" style="height: 400px; object-fit:cover;">
            <h1 id="imovel-titulo" class="fw-bold"></h1>
            <p id="imovel-cidade" class="text-muted fs-5"></p>
            <hr>
            <h4>Sobre este espaço</h4>
            <p id="imovel-descricao" style="white-space: pre-wrap;"></p>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 sticky-top" style="top: 20px;">
                <h3 class="fw-bold text-danger">R$ <span id="imovel-preco">0,00</span> <span class="fs-6 text-muted fw-normal">/ noite</span></h3>
                <hr>
                
                <div id="msg-reserva"></div>

                <form id="form-reserva">
                    <div class="mb-3">
                        <label>Check-in</label>
                        <input type="text" id="checkin" class="form-control" placeholder="Selecione a data" readonly required>
                    </div>
                    <div class="mb-3">
                        <label>Check-out</label>
                        <input type="text" id="checkout" class="form-control" placeholder="Selecione a data" readonly required>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-3 fw-bold fs-5">
                        <span>Total:</span>
                        <span id="total-display" class="text-success">R$ 0,00</span>
                    </div>

                    <button type="submit" id="btn-reservar" class="btn btn-danger w-100 mt-4 fs-5">Reservar Agora</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    // Pega o ID da URL (ex: detalhes.html?id=2)
    const urlParams = new URLSearchParams(window.location.search);
    const imovelId = urlParams.get('id');

    let precoDiaria = 0;
    let usuarioLogadoId = null;

    async function carregarImovel() {
        if (!imovelId) {
            document.getElementById('loading-area').innerHTML = "<h3 class='text-danger'>Imóvel não encontrado.</h3>";
            return;
        }

        // 1. Busca os dados do Imóvel
        const { data: imovel, error } = await supabase.from('imoveis').select('*').eq('id', imovelId).single();
        
        if (error || !imovel) {
            document.getElementById('loading-area').innerHTML = "<h3 class='text-danger'>Erro ao carregar imóvel.</h3>";
            return;
        }

        precoDiaria = parseFloat(imovel.preco_diaria);

        // Preenche a tela
        const imageUrl = imovel.imagem ? `${supabaseUrl}/storage/v1/object/public/imoveis-imagens/${imovel.imagem}` : 'https://via.placeholder.com/800x400';
        document.getElementById('imovel-img').src = imageUrl;
        document.getElementById('imovel-titulo').innerText = imovel.titulo;
        document.getElementById('imovel-cidade').innerText = imovel.cidade;
        document.getElementById('imovel-descricao').innerText = imovel.descricao;
        document.getElementById('imovel-preco').innerText = precoDiaria.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

        // Mostra o conteúdo e esconde o "Carregando"
        document.getElementById('loading-area').classList.add('d-none');
        document.getElementById('content-area').classList.remove('d-none');

        // 2. Verifica se está logado para poder reservar
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            const { data: usuarioDb } = await supabase.from('usuarios').select('id').eq('email', user.email).single();
            if(usuarioDb) usuarioLogadoId = usuarioDb.id;
        }
    }

    // --- LÓGICA DO CALENDÁRIO ---
    function calcularTotal() {
        const d1 = $("#checkin").datepicker('getDate');
        const d2 = $("#checkout").datepicker('getDate');
        
        if (d1 && d2 && d2 > d1) {
            const dias = (d2 - d1) / (1000 * 60 * 60 * 24);
            const total = dias * precoDiaria;
            $("#total-display").text("R$ " + total.toLocaleString('pt-BR', { minimumFractionDigits: 2 }));
            return { dias, total };
        }
        return null;
    }

    $(function() {
        // Inicializa os calendários
        $("#checkin").datepicker({ 
            minDate: 0, dateFormat: 'yy-mm-dd',
            onSelect: function(date) {
                var dt = new Date(date); dt.setDate(dt.getDate() + 1);
                $("#checkout").datepicker("option", "minDate", dt);
                calcularTotal();
            }
        });
        $("#checkout").datepicker({ 
            minDate: 1, dateFormat: 'yy-mm-dd',
            onSelect: calcularTotal
        });
    });

    // --- LÓGICA DE RESERVAR ---
    document.getElementById('form-reserva').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (!usuarioLogadoId) {
            alert("Você precisa fazer login para reservar!");
            window.location.href = "login.html";
            return;
        }

        const calculo = calcularTotal();
        if (!calculo) {
            alert("Selecione datas válidas de check-in e check-out.");
            return;
        }

        const btn = document.getElementById('btn-reservar');
        btn.disabled = true;
        btn.innerText = "Processando...";

        const checkin = document.getElementById('checkin').value;
        const checkout = document.getElementById('checkout').value;

        // Salva a reserva no banco (simplificado, sem cartão por enquanto)
        const { error } = await supabase.from('reservas').insert([{
            imovel_id: imovelId,
            usuario_id: usuarioLogadoId,
            data_inicio: checkin,
            data_fim: checkout,
            dias: calculo.dias,
            valor_total: calculo.total,
            metodo_pagamento: 'combinar',
            status: 'Confirmada'
        }]);

        if (error) {
            document.getElementById('msg-reserva').innerHTML = `<div class='alert alert-danger'>Erro: ${error.message}</div>`;
            btn.disabled = false;
            btn.innerText = "Reservar Agora";
        } else {
            document.getElementById('msg-reserva').innerHTML = `<div class='alert alert-success'>Reserva Confirmada!</div>`;
            btn.innerText = "Sucesso!";
        }
    });

    carregarImovel();
</script>
</body>
</html>
