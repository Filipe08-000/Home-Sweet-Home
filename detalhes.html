<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Imóvel - Home Sweet Home</title>
    
    <title>Reservar Imóvel - Home Sweet Home</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    
    <style>
        /* Correção para o calendário aparecer na frente do card */
        #ui-datepicker-div { z-index: 9999 !important; }
        .ui-datepicker { background: #fff; border: 1px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 8px; padding: 10px; }
        .imovel-img { height: 450px; object-fit: cover; border-radius: 12px; }
        .sticky-card { position: sticky; top: 20px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm">
<div class="container">
<a class="navbar-brand text-danger fw-bold" href="index.html">Home Sweet Home</a>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Voltar ao Início</a>
        <a href="index.html" class="btn btn-outline-dark btn-sm">Voltar</a>
</div>
</nav>

<div class="container mt-4 mb-5">
    <div id="loader" class="text-center py-5">
        <div class="spinner-border text-danger" role="status"></div>
        <p class="mt-2 text-muted">Carregando detalhes do lar...</p>
    </div>

    <div id="main-content" class="row d-none">
        
<div class="container mt-5">
    <div class="row justify-content-center">
<div class="col-md-8">
            <img id="imovel-img" src="" class="img-fluid w-100 imovel-img mb-4" alt="Imóvel">
            
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h1 id="imovel-titulo" class="fw-bold mb-1"></h1>
                    <p id="imovel-cidade" class="text-muted fs-5"></p>
                </div>
                <div id="chat-btn-area"></div>
            </div>
            <div class="card shadow p-4 border-0">
                <h2 class="text-center mb-4 text-danger fw-bold">Confirmar Reserva</h2>
                <div id="msg-status"></div>

            <hr>
            <h4 class="fw-bold">Sobre este espaço</h4>
            <p id="imovel-descricao" style="white-space: pre-wrap;" class="text-secondary"></p>
            <hr>

            <div class="mt-4">
                <h4 class="fw-bold">Avaliações (<span id="total-avaliacoes">0</span>) - ⭐ <span id="media-nota">0.0</span></h4>
                
                <div id="area-minha-avaliacao" class="d-none border p-3 rounded mb-4 bg-white shadow-sm">
                    <h6 class="fw-bold mb-3">O que você achou da sua estadia?</h6>
                    <form id="form-avaliacao">
                        <div class="row g-2">
                            <div class="col-md-3">
                                <select id="nota" class="form-select" required>
                                    <option value="5">5 - Excelente</option>
                                    <option value="4">4 - Muito Bom</option>
                                    <option value="3">3 - Bom</option>
                                    <option value="2">2 - Regular</option>
                                    <option value="1">1 - Ruim</option>
                                </select>
                            </div>
                            <div class="col-md-9">
                                <textarea id="comentario" class="form-control" placeholder="Escreva um comentário (opcional)..." rows="1"></textarea>
                            </div>
                <form id="form-reserva">
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Data de Início</label>
                            <input type="date" id="data_inicio" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Data de Fim</label>
                            <input type="date" id="data_fim" class="form-control" required>
</div>
                        <button type="submit" id="btn-enviar-av" class="btn btn-dark btn-sm mt-2">Enviar Avaliação</button>
                    </form>
                </div>

                <div id="lista-avaliacoes" class="list-group list-group-flush mt-3">
</div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 p-4 sticky-card">
                <h3 class="fw-bold text-danger">R$ <span id="imovel-preco">0,00</span> <span class="fs-6 text-muted fw-normal">/ noite</span></h3>
                <hr>
                
                <div id="msg-reserva"></div>

                <form id="form-reserva">
                    <div class="mb-3">
                        <label class="small fw-bold text-uppercase text-muted">Check-in</label>
                        <input type="text" id="checkin" class="form-control" placeholder="Selecione" readonly required>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold text-uppercase text-muted">Check-out</label>
                        <input type="text" id="checkout" class="form-control" placeholder="Selecione" readonly required>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4 p-2 bg-light rounded">
                        <span class="fw-bold">Total estimado:</span>
                        <span id="total-display" class="text-success fw-bold">R$ 0,00</span>
                    <div class="mb-4">
                        <label class="form-label">Método de Pagamento</label>
                        <select id="metodo_pagamento" class="form-select">
                            <option value="pix">Pix</option>
                            <option value="cartao">Cartão de Crédito</option>
                        </select>
</div>

                    <button type="submit" id="btn-reservar" class="btn btn-danger w-100 mt-4 py-2 fs-5 fw-bold">Reservar agora</button>
                    <button type="submit" id="btn-reservar" class="btn btn-danger w-100 py-2 fs-5">Confirmar e Pagar</button>
</form>
</div>
</div>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
const supabase = createClient(supabaseUrl, supabaseKey)

    // Pegar o ID do imóvel da URL (ex: reserva.html?id=123)
const urlParams = new URLSearchParams(window.location.search);
const imovelId = urlParams.get('id');

    let precoDiaria = 0;
    let usuarioLogadoId = null;
    let donoId = null;

    async function init() {
        if (!imovelId) { window.location.href = 'index.html'; return; }
    // 1. Função Robusta de Proteção de Página
    async function verificarAcesso() {
        const { data: { user }, error } = await supabase.auth.getUser();

        // 1. Verificar Autenticação
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            const { data: userDb } = await supabase.from('usuarios').select('id').eq('email', user.email).single();
            usuarioLogadoId = userDb?.id;
        if (error || !user) {
            console.log("Usuário não autenticado.");
            window.location.href = 'login.html';
            return null;
}

        // 2. Buscar Dados do Imóvel
        const { data: imovel, error } = await supabase.from('imoveis').select('*').eq('id', imovelId).single();
        if (error || !imovel) { alert("Imóvel não encontrado!"); return; }

        precoDiaria = parseFloat(imovel.preco_diaria);
        donoId = imovel.dono_id;

        // Preencher UI
        document.getElementById('imovel-img').src = `${supabaseUrl}/storage/v1/object/public/imoveis-imagens/${imovel.imagem}`;
        document.getElementById('imovel-titulo').innerText = imovel.titulo;
        document.getElementById('imovel-cidade').innerText = imovel.cidade;
        document.getElementById('imovel-descricao').innerText = imovel.descricao;
        document.getElementById('imovel-preco').innerText = precoDiaria.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

        // Botão de Chat (Só aparece se for logado e NÃO for o dono)
        if (usuarioLogadoId && usuarioLogadoId !== donoId) {
            document.getElementById('chat-btn-area').innerHTML = `
                <a href="chat.html?imovel_id=${imovelId}&destinatario_id=${donoId}" class="btn btn-outline-danger">
                    <i class="bi bi-chat-dots"></i> Falar com Anfitrião
                </a>`;
            document.getElementById('area-minha-avaliacao').classList.remove('d-none');
        }

        document.getElementById('loader').classList.add('d-none');
        document.getElementById('main-content').classList.remove('d-none');

        // Carregar as avaliações
        carregarAvaliacoes();
        console.log("Usuário logado:", user.id);
        return user.id;
}

    // --- AVALIAÇÕES ---
    async function carregarAvaliacoes() {
        const { data: avs } = await supabase.from('avaliacoes').select('*, usuarios(nome)').eq('imovel_id', imovelId).order('data_avaliacao', { ascending: false });
        
        const lista = document.getElementById('lista-avaliacoes');
        const mediaSpan = document.getElementById('media-nota');
        const totalSpan = document.getElementById('total-avaliacoes');
        
        lista.innerHTML = '';
        totalSpan.innerText = avs?.length || 0;
    // Executa ao carregar a página
    verificarAcesso();

        if (avs && avs.length > 0) {
            let soma = 0;
            avs.forEach(av => {
                soma += av.nota;
                lista.innerHTML += `
                    <div class="list-group-item px-0 py-3 bg-transparent border-0 border-bottom">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold">${av.usuarios.nome}</span>
                            <span class="text-warning">⭐ ${av.nota}</span>
                        </div>
                        <p class="mb-0 text-muted small mt-1">${av.comentario || 'Sem comentário.'}</p>
                    </div>`;
            });
            mediaSpan.innerText = (soma / avs.length).toFixed(1);
        } else {
            lista.innerHTML = '<p class="text-muted small">Ainda não há avaliações para este lugar.</p>';
        }
    }

    document.getElementById('form-avaliacao').addEventListener('submit', async (e) => {
    // 2. Ação de Reservar
    document.getElementById('form-reserva').addEventListener('submit', async (e) => {
e.preventDefault();
        const btn = document.getElementById('btn-enviar-av');
        btn.disabled = true;

        const { error } = await supabase.from('avaliacoes').upsert({
            imovel_id: imovelId,
            usuario_id: usuarioLogadoId,
            nota: document.getElementById('nota').value,
            comentario: document.getElementById('comentario').value
        });
        const btn = document.getElementById('btn-reservar');
        const msgDiv = document.getElementById('msg-status');

        if (error) { alert("Erro ao avaliar: " + error.message); btn.disabled = false; }
        else { alert("Avaliação salva!"); carregarAvaliacoes(); btn.disabled = false; }
    });
        btn.disabled = true;
        btn.innerText = "Processando...";

    // --- RESERVAS & CALENDÁRIO ---
    function calc() {
        const d1 = $("#checkin").datepicker('getDate');
        const d2 = $("#checkout").datepicker('getDate');
        if (d1 && d2 && d2 > d1) {
            const dias = (d2 - d1) / (1000 * 60 * 60 * 24);
            const total = dias * precoDiaria;
            $("#total-display").text("R$ " + total.toLocaleString('pt-BR', { minimumFractionDigits: 2 }));
            return { dias, total };
        }
        return null;
    }
        try {
            // Pegamos o ID do usuário de novo no momento do clique para segurança
            const usuarioId = await verificarAcesso();
            if (!usuarioId) return;

    $(function() {
        $("#checkin").datepicker({ 
            minDate: 0, dateFormat: 'yy-mm-dd',
            onSelect: function(date) {
                var dt = new Date(date); dt.setDate(dt.getDate() + 1);
                $("#checkout").datepicker("option", "minDate", dt);
                calc();
            if (!imovelId) {
                throw new Error("ID do imóvel não encontrado na URL.");
}
        });
        $("#checkout").datepicker({ minDate: 1, dateFormat: 'yy-mm-dd', onSelect: calc });
    });

    document.getElementById('form-reserva').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!usuarioLogadoId) { window.location.href = 'login.html'; return; }

        const res = calc();
        if (!res) return;

        const btn = document.getElementById('btn-reservar');
        btn.disabled = true; btn.innerText = "Reservando...";

        const { error } = await supabase.from('reservas').insert([{
            imovel_id: imovelId,
            usuario_id: usuarioLogadoId,
            data_inicio: $("#checkin").val(),
            data_fim: $("#checkout").val(),
            dias: res.dias,
            valor_total: res.total,
            metodo_pagamento: 'Combinar',
            status: 'Confirmada'
        }]);

        if (error) { alert(error.message); btn.disabled = false; btn.innerText = "Reservar agora"; }
        else { window.location.href = 'minhas_viagens.html'; }
            const dataInicio = document.getElementById('data_inicio').value;
            const dataFim = document.getElementById('data_fim').value;
            const metodo = document.getElementById('metodo_pagamento').value;

            // 3. Salvar na tabela 'reservas'
            // IMPORTANTE: usuario_id deve ser UUID no banco
            const { error: resError } = await supabase
                .from('reservas')
                .insert([
                    {
                        imovel_id: imovelId, // int8
                        usuario_id: usuarioId, // uuid
                        data_inicio: dataInicio,
                        data_fim: dataFim,
                        metodo_pagamento: metodo,
                        status: 'pendente'
                    }
                ]);

            if (resError) throw resError;

            msgDiv.innerHTML = `<div class='alert alert-success'>Reserva realizada com sucesso!</div>`;
            setTimeout(() => window.location.href = 'minhas-reservas.html', 2000);

        } catch (erro) {
            console.error(erro);
            msgDiv.innerHTML = `<div class='alert alert-danger'>Erro: ${erro.message}</div>`;
            btn.disabled = false;
            btn.innerText = "Confirmar e Pagar";
        }
});

    init();
</script>
</body>
</html>
