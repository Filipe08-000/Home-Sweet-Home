<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Home Sweet Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow p-4 border-0">
                <h3 class="text-center mb-4 text-danger fw-bold">Login</h3>
                
                <div id="msg-erro"></div>

                <form id="form-login">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Senha</label>
                        <input type="password" id="senha" class="form-control" required>
                    </div>
                    <button type="submit" id="btn-submit" class="btn btn-danger w-100">Entrar</button>
                </form>
                
                <p class="mt-3 text-center small">
                    Não tem conta? <a href="cadastro.html" class="text-danger text-decoration-none">Cadastre-se</a>
                </p>
                <p class="text-center small">
                    <a href="index.html" class="text-muted text-decoration-none">Voltar ao início</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = 'https://drlnbbodugxkndtpomfa.supabase.co'
    const supabaseKey = 'sb_publishable_uxQbUyjsM-DgKapQzvE32Q_ZUNBtdp1'
    const supabase = createClient(supabaseUrl, supabaseKey)

    document.getElementById('form-login').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btn-submit');
        const msgDiv = document.getElementById('msg-erro');
        
        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;

        btn.disabled = true;
        btn.innerText = "Entrando...";
        msgDiv.innerHTML = "";

        // Tenta fazer o login com o Supabase
        const { data, error } = await supabase.auth.signInWithPassword({
            email: email,
            password: senha
        });

        if (error) {
            msgDiv.innerHTML = `<div class='alert alert-danger'>Erro: Email ou senha incorretos.</div>`;
            btn.disabled = false;
            btn.innerText = "Entrar";
        } else {
            // Deu certo! Manda de volta pra tela inicial
            window.location.href = 'index.html';
        }
    });
</script>
</body>
</html>
